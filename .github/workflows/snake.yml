# Generates the contribution "snake" animation daily and publishes it to the
# `output` branch as snake.svg (light) + snake-dark.svg (dark), which
# README.md references via a <picture> element for theme switching.
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # once a day
  workflow_dispatch: {} # allow manual trigger from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: aacc1on
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
